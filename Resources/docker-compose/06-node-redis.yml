services:
  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"

  app:
    image: node:20-alpine
    working_dir: /app
    command: ["sh", "-c", "node -e \"const r=require('net');const c=r.createConnection(6379,'redis');c.on('connect',()=>{console.log('REDIS_CONNECTED');c.destroy()});c.on('error',(e)=>console.log('REDIS_ERROR:'+e.code))\" || echo FALLBACK"]
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
