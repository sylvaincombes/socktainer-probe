services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: pgpass
      POSTGRES_USER: pguser
      POSTGRES_DB: appdb
    volumes:
      - pg_data:/var/lib/postgresql/data

  adminer:
    image: adminer:latest
    ports:
      - "18082:8080"
    depends_on:
      - db

volumes:
  pg_data:
